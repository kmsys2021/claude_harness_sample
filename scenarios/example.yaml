# 시나리오 파일 — 에이전트(Claude Code)에게 줄 작업을 정의합니다.
# 새 프로젝트를 시작할 때 이 파일을 복사해서 내용만 바꾸세요.

scenario_id: "example_01"
description: "예시 시나리오 — 폴더 구조 파악 후 요약"

# ① 에이전트의 역할/페르소나
system_prompt: |
  당신은 코드베이스를 분석하는 전문 에이전트입니다.
  주어진 작업을 단계별로 수행하고 결과를 명확하게 보고하세요.

# ② 에이전트에게 줄 작업 (구체적으로 쓸수록 좋음)
task: |
  현재 프로젝트 폴더(Harness_sample)의 구조를 파악하고
  각 파일/폴더의 역할을 한 문장씩 요약해주세요.

# ③ 사용 가능한 도구 (Claude Code 내장 도구)
allowed_tools:
  - read_file      # 파일 내용 읽기
  - list_files     # 폴더 목록 보기
  - search_files   # 파일 검색

# ④ 성공 기준 (실행 후 수동으로 체크)
success_criteria:
  - "모든 파일의 역할이 설명되었는가?"
  - "누락된 파일 없이 전체 구조가 파악되었는가?"

# ⑤ 기타 설정
max_turns: 10       # 최대 몇 번 도구를 호출할 수 있는지
log_result: true    # 실행 결과를 logs/ 폴더에 저장할지 여부
